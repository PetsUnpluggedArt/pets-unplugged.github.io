<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PAWS Interactive Dog Coloring Book - Scan QR to animate your artwork!">
    <title>PAWS Animation</title>
    
    <link rel="icon" type="image/x-icon" href="https://petsunplugged.com/favicon.ico">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-81TJS1GV21"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-81TJS1GV21');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --pets-primary: #fca5a5;
            --pets-secondary: #818cf8;
            --pets-dark: #4c1d95;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f7f3f9; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bg-pets-primary { background-color: var(--pets-primary); }
        .text-pets-primary { color: var(--pets-primary); }
        .header-logo { max-height: 100px; height: auto; width: auto; }
        @media (min-width: 640px) { .header-logo { max-height: 110px; } }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 1rem;
        }
        .social-icon:hover { opacity: 0.8; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- Logo only (no nav, no Amazon banner) -->
    <header class="py-8">
        <img src="/assets/images/LOGO_MAX.svg" alt="Pets Unplugged Logo" class="header-logo">
    </header>

    <!-- Vimeo embed area -->
    <main class="flex-grow w-full px-4">
        <div class="video-container">
            {{ content }}  <!-- Your Vimeo iframe goes here -->
        </div>
    </main>

    <!-- Footer: copyright + share icons only -->
    <footer class="bg-gray-800 text-white py-12 w-full mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm mb-6">&copy; 2025 Pets Unplugged™. All Rights Reserved.</p>
            <div class="mb-8">
                <p class="text-sm text-gray-400 mb-4">Share this animation</p>
                <div class="flex justify-center space-x-6">
                    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url }}" target="_blank" class="text-3xl social-icon transition hover:text-pets-primary" aria-label="Share on Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://twitter.com/intent/tweet?url={{ page.url | absolute_url }}&text=Check out this PAWS animation!" target="_blank" class="text-3xl social-icon transition hover:text-pets-primary" aria-label="Share on X"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://pinterest.com/pin/create/button/?url={{ page.url | absolute_url }}" target="_blank" class="text-3xl social-icon transition hover:text-pets-primary" aria-label="Share on Pinterest"><i class="fab fa-pinterest-p"></i></a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
