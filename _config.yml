# Welcome to Jekyll!
# Site settings for Pets Unplugged

title: Pets Unplugged
description: Interactive pet coloring books with QR animations. Color adorable pet illustrations, scan the QR code, and watch a fun 6-second animation. Perfect for dog lovers, kids, families, and classrooms.
email: hello@petsunplugged.com

url: "https://petsunplugged.com"
baseurl: ""

# Clean URLs for blog posts only — videos keep .html extension via defaults below
permalink: /blog/:slug/

twitter:
  username: PetsUnplugged
  card: summary_large_image

author:
  name: Pets Unplugged
  email: hello@petsunplugged.com

logo: /assets/images/paws_cover.jpg

collections:
  collections:
    output: true
  videos:
    output: true
    sitemap: false
    permalink: /videos/:name.html
  merchandise:
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      sitemap: true
      permalink: /:path/:basename.html
  - scope:
      path: ""
      type: "posts"
    values:
      sitemap: true
      layout: post
  - scope:
      path: "videos"
    values:
      permalink: /videos/:basename.html

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag